<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>সদস্য তালিকা — শহীদ আইয়ুব আলী স্মৃতি সংঘ ও পাঠাগার</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="navRoot"></div>

<main class="wrap">
  <div class="page-toolbar">
    <div class="section-label">সদস্য তালিকা</div>
    <div id="refreshBtnRoot"></div>
  </div>

  <div style="display:flex; justify-content:space-between; align-items:center; gap:14px; margin-bottom:18px; flex-wrap:wrap;">
    <input id="memberSearch" placeholder="নাম বা আইডি দিয়ে খুঁজুন..." style="max-width:320px;" oninput="renderMembers()" />
    <a href="register.html" class="btn brass" style="white-space:nowrap;">+ নতুন সদস্য যোগ করুন</a>
  </div>

  <table>
    <thead>
      <tr>
        <th>ছবি</th><th>আইডি</th><th>নাম</th><th>ধরন</th><th>গ্রাম</th>
        <th id="phoneHeader" style="display:none;">ফোন</th>
        <th id="feeHeader" style="display:none;">চাঁদা</th>
        <th id="payHeader" style="display:none;">পেমেন্ট বিবরণ</th>
        <th id="actionsHeader" style="display:none;"></th>
      </tr>
    </thead>
    <tbody id="memberBody"></tbody>
  </table>
  <div class="empty-state" id="memberEmpty" style="display:none;">কোনো সদস্য নেই।</div>
</main>

<div id="editModalRoot"></div>
<div id="adminModalRoot"></div>
<div class="footer">শহীদ আইয়ুব আলী স্মৃতি সংঘ ও পাঠাগার · কুলানন্দপুর, বলগাড়ী, ঘোড়াঘাট, দিনাজপুর</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script>
renderNav('members.html');
let allMembers = [];
let committeeByMember = {};

function onAdminStateChange() { renderMembers(); }

function renderMembers() {
  const q = document.getElementById('memberSearch').value.trim().toLowerCase();
  const list = q
    ? allMembers.filter(m => String(m.Name).toLowerCase().includes(q) || String(m.ID).includes(q))
    : allMembers;

  const adminOn = isAdmin();
  document.getElementById('phoneHeader').style.display = adminOn ? '' : 'none';
  document.getElementById('feeHeader').style.display = adminOn ? '' : 'none';
  document.getElementById('payHeader').style.display = adminOn ? '' : 'none';
  document.getElementById('actionsHeader').style.display = adminOn ? '' : 'none';

  const body = document.getElementById('memberBody');
  const empty = document.getElementById('memberEmpty');
  if (list.length === 0) {
    body.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  body.innerHTML = list.map(m => {
    const photo = m.PhotoURL
      ? `<img src="${m.PhotoURL}" style="width:40px; height:40px; object-fit:cover; border-radius:4px; border:1px solid var(--line);" />`
      : `<div style="width:40px; height:40px; border-radius:4px; background:var(--line); display:flex; align-items:center; justify-content:center; font-size:0.7rem; color:var(--muted);">নেই</div>`;
    let payDetail = '—';
    if (m.PaymentMethod === 'cash') {
      payDetail = `ক্যাশ · ${m.CashReceivedBy || '—'}`;
    } else if (m.PaymentMethod === 'online') {
      payDetail = `অনলাইন · ${m.TransFrom || '—'} → ${m.TransTo || '—'} · ট্রা.নং: ${m.TransactionID || '—'}`;
    }
    const position = committeeByMember[m.ID];
    const typeTag = position
      ? `<span class="tag role">${position}</span>`
      : `<span class="tag available">সাধারণ সদস্য</span>`;
    const actions = adminOn ? `
      <button class="btn small outline" onclick="openEdit('${m.ID}')">এডিট</button>
      <button class="btn small" style="background:var(--rust);" onclick="removeMember('${m.ID}')">ডিলিট</button>
    ` : '';
    return `
    <tr>
      <td>${photo}</td>
      <td class="mono">${m.ID}</td>
      <td>${m.Name}<br><span style="color:var(--muted); font-size:0.78rem;">${m.FatherName || ''}</span></td>
      <td>${typeTag}</td>
      <td>${m.Village || '—'}</td>
      <td style="display:${adminOn ? 'table-cell' : 'none'};">${m.Phone || '—'}</td>
      <td style="display:${adminOn ? 'table-cell' : 'none'};" class="mono">${m.FeeAmount ? '৳' + m.FeeAmount : '—'}</td>
      <td style="display:${adminOn ? 'table-cell' : 'none'}; font-size:0.8rem;">${payDetail}</td>
      <td style="display:${adminOn ? 'table-cell' : 'none'}; white-space:nowrap;">${actions}</td>
    </tr>`;
  }).join('');
}

async function loadMembers() {
  const [members, committee] = await Promise.all([
    Api.get('listMembers'),
    Api.get('listCommittee'),
  ]);
  allMembers = members;
  committeeByMember = {};
  (committee || []).forEach(c => { committeeByMember[c.MemberID] = c.Position; });
  renderMembers();
}

// ---------- এডিট মডাল ----------
let editPhotoDataUrl = '';

function openEdit(id) {
  const m = allMembers.find(x => String(x.ID) === String(id));
  if (!m) return;
  editPhotoDataUrl = '';

  document.getElementById('editModalRoot').innerHTML = `
    <div class="modal-backdrop" onclick="closeEdit(event)">
      <div class="modal" style="max-width:520px;" onclick="event.stopPropagation()">
        <h3>সদস্যের তথ্য এডিট করুন</h3>
        <label>আইডি</label>
        <input value="${m.ID}" disabled />
        <div class="grid-2">
          <div><label>নাম</label><input id="eName" value="${m.Name || ''}" /></div>
          <div><label>বাবার নাম</label><input id="eFather" value="${m.FatherName || ''}" /></div>
          <div><label>মায়ের নাম</label><input id="eMother" value="${m.MotherName || ''}" /></div>
          <div><label>গ্রাম</label><input id="eVillage" value="${m.Village || ''}" /></div>
          <div><label>শিক্ষাগত যোগ্যতা</label><input id="eEducation" value="${m.Education || ''}" /></div>
          <div><label>ফোন নম্বর</label><input id="ePhone" value="${m.Phone || ''}" /></div>
        </div>

        <label>ছবি বদলাতে চাইলে নতুন ছবি দিন (না দিলে আগেরটাই থাকবে)</label>
        <input id="ePhoto" type="file" accept="image/*" onchange="handleEditPhoto(event)" />
        <img id="editPhotoPreview" src="${m.PhotoURL || ''}" style="display:${m.PhotoURL ? 'block' : 'none'}; margin-top:10px; width:80px; height:80px; object-fit:cover; border:1px solid var(--line); border-radius:4px;" />

        <div class="grid-2">
          <div><label>চাঁদার পরিমাণ (৳)</label><input id="eFee" type="number" min="0" value="${m.FeeAmount || 0}" /></div>
          <div>
            <label>পেমেন্ট পদ্ধতি</label>
            <select id="ePayMethod" onchange="toggleEditPayMethod()">
              <option value="cash" ${m.PaymentMethod === 'online' ? '' : 'selected'}>ক্যাশ</option>
              <option value="online" ${m.PaymentMethod === 'online' ? 'selected' : ''}>অনলাইন</option>
            </select>
          </div>
        </div>
        <div id="eCashWrap" style="display:${m.PaymentMethod === 'online' ? 'none' : 'block'};">
          <label>কার কাছে জমা দিলেন</label>
          <input id="eCashReceivedBy" value="${m.CashReceivedBy || ''}" />
        </div>
        <div id="eOnlineWrap" style="display:${m.PaymentMethod === 'online' ? 'block' : 'none'};">
          <div class="grid-2">
            <div><label>কোন নম্বর হতে</label><input id="eTransFrom" value="${m.TransFrom || ''}" /></div>
            <div><label>কোন নম্বরে</label><input id="eTransTo" value="${m.TransTo || ''}" /></div>
          </div>
          <label>ট্রানজেকশন নম্বর</label>
          <input id="eTransactionId" value="${m.TransactionID || ''}" />
        </div>

        <button class="btn brass" style="margin-top:18px;" onclick="saveEdit('${m.ID}')">সংরক্ষণ করুন</button>
        <button class="btn outline" style="margin-top:18px;" onclick="closeEdit()">বাতিল</button>
        <div id="eMsg"></div>
      </div>
    </div>
  `;
}

function closeEdit() { document.getElementById('editModalRoot').innerHTML = ''; }

function toggleEditPayMethod() {
  const online = document.getElementById('ePayMethod').value === 'online';
  document.getElementById('eCashWrap').style.display = online ? 'none' : 'block';
  document.getElementById('eOnlineWrap').style.display = online ? 'block' : 'none';
}

function handleEditPhoto(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    const img = new Image();
    img.onload = () => {
      const maxSize = 400;
      let { width, height } = img;
      if (width > height && width > maxSize) { height *= maxSize / width; width = maxSize; }
      else if (height > maxSize) { width *= maxSize / height; height = maxSize; }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      editPhotoDataUrl = canvas.toDataURL('image/jpeg', 0.75);
      const preview = document.getElementById('editPhotoPreview');
      preview.src = editPhotoDataUrl;
      preview.style.display = 'block';
    };
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
}

async function saveEdit(id) {
  const payMethod = document.getElementById('ePayMethod').value;
  const payload = {
    id,
    name: document.getElementById('eName').value.trim(),
    fatherName: document.getElementById('eFather').value.trim(),
    motherName: document.getElementById('eMother').value.trim(),
    village: document.getElementById('eVillage').value.trim(),
    education: document.getElementById('eEducation').value.trim(),
    phone: document.getElementById('ePhone').value.trim(),
    photo: editPhotoDataUrl,
    feeAmount: document.getElementById('eFee').value || 0,
    paymentMethod: payMethod,
    cashReceivedBy: payMethod === 'cash' ? document.getElementById('eCashReceivedBy').value.trim() : '',
    transFrom: payMethod === 'online' ? document.getElementById('eTransFrom').value.trim() : '',
    transTo: payMethod === 'online' ? document.getElementById('eTransTo').value.trim() : '',
    transactionId: payMethod === 'online' ? document.getElementById('eTransactionId').value.trim() : '',
  };
  const msg = document.getElementById('eMsg');
  if (!payload.name) { msg.innerHTML = `<div class="msg error">নাম আবশ্যক</div>`; return; }
  const res = await Api.post('updateMember', payload);
  if (res.error) { msg.innerHTML = `<div class="msg error">${res.error}</div>`; return; }
  closeEdit();
  loadMembers();
}

async function removeMember(id) {
  if (!confirm(`আইডি ${id} সদস্যকে মুছে ফেলতে চান? (কমিটিতে থাকলে সেখান থেকেও বাদ যাবে)`)) return;
  await Api.post('deleteMember', { id });
  loadMembers();
}

renderRefreshBtn(loadMembers);
  loadMembers();
</script>
</body>
</html>
